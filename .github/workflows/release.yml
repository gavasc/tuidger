name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goarch: amd64
            nfpm_arch: amd64
          - goarch: arm64
            nfpm_arch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          go build -ldflags "-s -w -X main.version=${VERSION}" \
            -o tuidger_linux_${{ matrix.goarch }} .

      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' \
            | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update -q
          sudo apt-get install -y nfpm

      - name: Build .deb
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.nfpm_arch }}
        run: |
          cp tuidger_linux_${{ matrix.goarch }} tuidger
          mkdir -p dist
          nfpm package --packager deb --target dist --config packaging/nfpm.yaml
          rm tuidger

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goarch }}
          path: |
            tuidger_linux_${{ matrix.goarch }}
            dist/*.deb

  publish:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  aur-update:
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update PKGBUILD version
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          PKGVER=${VERSION#v}
          sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" packaging/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" packaging/PKGBUILD

      - name: Push to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.2
        with:
          pkgname: tuidger
          pkgbuild: ./packaging/PKGBUILD
          commit_username: gavasc
          commit_email: gavasc@proton.me
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
          updpkgsums: true
